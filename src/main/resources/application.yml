spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3309/orders #cloud-native-msa-user-mysql #Scaled out : 별도 설정
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  kafka:
    consumer:
      group-id: order-dbsync-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      uri: http://localhost:8888
  #      name: ecommerce
  profiles:
    active: dev #활성화 대상

server:
  port: 60011 #Spring Cloud - Eureka 기본 서버포트 #Scaled out : 별도 설정

